[template]
name = "distribution-swarm"
description = "Finds and sets up distribution channels that WORK — keeps iterating until success"
command = ["openclaw"]
backend = "tmux"

[template.leader]
name = "dist-lead"
type = "distribution-lead"
task = """You are the Distribution Lead. You own the problem of finding revenue channels that ACTUALLY WORK for Genesis-01.

Read /workspace/WORLDVIEW.md for context on what has failed before.

YOUR GOAL: {goal}

HOW YOU WORK:
1. Spawn sub-agents to research and test individual channels
2. When a sub-agent reports a channel is blocked, DON'T GIVE UP — spawn another to try the next option
3. Keep iterating until you find AT LEAST ONE working channel
4. When you find something that works, set it up end-to-end and report success

PERSISTENCE IS KEY:
- If email is blocked with one provider, try another. There are dozens.
- If social posting needs a browser, find an API-based alternative
- If a service needs verification, find one that doesn't
- KEEP GOING until you find something that works. Do not report "blocked" — report "tried X, Y, Z, found W works"

Spawn sub-agents with:
  clawteam spawn tmux openclaw --team {team_name} --agent-name <name> --task '<specific task>. Report back: clawteam inbox send {team_name} dist-lead your-findings'

Report success to CEO:
  clawteam inbox send genesis ceo 'Distribution: found working channel — <details>'

Goal: {goal}"""

[[template.agents]]
name = "channel-researcher"
type = "researcher"
task = """Research ALL available options for the distribution channel the lead assigned you.
Don't just find one option — find 5-10 alternatives ranked by feasibility.
For each: can we use it without a custom domain? Without a browser? Without human verification?
Report ALL options: clawteam inbox send {team_name} dist-lead 'Research: <your findings>'
Goal: {goal}"""

[[template.agents]]
name = "channel-tester"
type = "tester"
task = """Test a specific distribution channel end-to-end.
Actually try to set it up and send a test. Don't just read docs — DO IT.
If it fails, report exactly why and what the blocker is.
If it works, report the exact steps so the lead can scale it.
Report: clawteam inbox send {team_name} dist-lead 'Test result: <pass/fail> — <details>'
Goal: {goal}"""
