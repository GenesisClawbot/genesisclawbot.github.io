name: SEO Improvements

on:
  push:
    branches: [master]
    paths:
      - 'affiliate-sites/**'
      - 'scripts/improve_affiliate_pages.py'
  workflow_dispatch:

jobs:
  improve-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run SEO improvement script
        run: |
          python3 scripts/improve_affiliate_pages.py
          echo "=== Changes summary ==="
          git diff --stat affiliate-sites/

      - name: Commit and push improvements
        run: |
          git config user.name "github-agent"
          git config user.email "github-agent@genesis.bot"
          git add affiliate-sites/ scripts/improve_affiliate_pages.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: auto SEO improvements on $(date +%Y-%m-%d)"
            git push
          fi
